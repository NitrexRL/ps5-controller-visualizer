<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PS5 Controller Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet" />
  <script type="module" crossorigin src="/Nitrex-Controller/assets/index-BbUl331e.js"></script>
  <link rel="stylesheet" crossorigin href="/Nitrex-Controller/assets/index-D5yjCxqO.css">
</head>

<body>
  <div id="app">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-E09DW8W5BJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-E09DW8W5BJ');
    </script>

    <div class="controller ps5" id="gv-controller">
      <div class="sticks">
        <div class="stick left" id="gv-stick-left"></div>
        <div class="stick right" id="gv-stick-right"></div>
      </div>

      <div class="abxy">
        <div class="button a" id="gv-a"></div>
        <div class="button b" id="gv-b"></div>
        <div class="button x" id="gv-x"></div>
        <div class="button y" id="gv-y"></div>
      </div>

      <div class="dpad">
        <div class="face up" id="gv-up"></div>
        <div class="face right" id="gv-right"></div>
        <div class="face down" id="gv-down"></div>
        <div class="face left" id="gv-left"></div>
      </div>

      <div class="arrows">
        <div class="back" id="gv-back"></div>
        <div class="start" id="gv-start"></div>
      </div>

      <div class="bumpers">
        <div class="bumper left" id="gv-lb"></div>
        <div class="bumper right" id="gv-rb"></div>
      </div>

      <div class="triggers">
        <div class="trigger left" id="gv-lt"></div>
        <div class="trigger right" id="gv-rt"></div>
      </div>

      <div class="ps" id="gv-ps"></div>
      <div class="touchpad" id="gv-touchpad"></div>
    </div>
  </div>

</html>
